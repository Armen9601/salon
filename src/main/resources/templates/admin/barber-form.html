<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(~{::main})}">
<main class="py-4">
  <div class="mx-auto" style="max-width: 720px;">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mb-3">
      <div>
        <h1 class="h4 fw-bold mb-1" th:text="${barberId} ? 'Edit barber' : 'Add barber'">Barber</h1>
        <div class="text-secondary">Manage barber information.</div>
      </div>
      <a class="btn btn-outline-light btn-sm" th:href="@{/admin/barbers}">← Back</a>
    </div>

    <div class="p-4 rounded-4 card-glass">
      <form method="post"
            th:action="${barberId} ? @{/admin/barbers/{id}/edit(id=${barberId})} : @{/admin/barbers/new}"
            th:object="${form}"
            class="row g-3">

        <div class="col-12">
          <label class="form-label">Full name</label>
          <input class="form-control bg-dark text-light border-secondary" th:field="*{fullName}">
          <div class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">err</div>
        </div>

        <div class="col-12">
          <label class="form-label">Bio</label>
          <textarea class="form-control bg-dark text-light border-secondary" rows="4" th:field="*{bio}"></textarea>
        </div>

        <div class="col-12">
          <label class="form-label">Photo URL (optional)</label>
          <input class="form-control bg-dark text-light border-secondary" th:field="*{photoUrl}">
        </div>

        <div class="col-12">
          <label class="form-label">Email (for notifications)</label>
          <input class="form-control bg-dark text-light border-secondary" th:field="*{email}" type="email" placeholder="barber@example.com">
        </div>

        <div class="col-12 d-flex gap-2 flex-wrap">
          <button class="btn btn-gold" type="submit">Save</button>
          <a class="btn btn-outline-light" th:href="@{/admin/barbers}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</main>
</body>
</html>
