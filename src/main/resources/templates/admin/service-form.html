<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(~{::main})}">
<main class="py-4">
  <div class="mx-auto" style="max-width: 820px;">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mb-3">
      <div>
        <h1 class="h4 fw-bold mb-1" th:text="${serviceId} ? 'Edit service' : 'Add service'">Service</h1>
        <div class="text-secondary">Names are stored per language (EN/RU/HY).</div>
      </div>
      <a class="btn btn-outline-light btn-sm" th:href="@{/admin/services}">← Back</a>
    </div>

    <div class="p-4 rounded-4 card-glass">
      <form method="post"
            th:action="${serviceId} ? @{/admin/services/{id}/edit(id=${serviceId})} : @{/admin/services/new}"
            th:object="${form}"
            class="row g-3">

        <div class="col-md-4">
          <label class="form-label">Code</label>
          <input class="form-control bg-dark text-light border-secondary" th:field="*{code}" placeholder="HAIRCUT">
          <div class="text-danger small" th:if="${#fields.hasErrors('code')}" th:errors="*{code}">err</div>
          <div class="text-secondary small mt-1">Use uppercase letters, numbers, underscore.</div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Duration (minutes)</label>
          <input class="form-control bg-dark text-light border-secondary" type="number" th:field="*{durationMinutes}">
          <div class="text-danger small" th:if="${#fields.hasErrors('durationMinutes')}" th:errors="*{durationMinutes}">err</div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Price (AMD)</label>
          <input class="form-control bg-dark text-light border-secondary" type="number" th:field="*{priceAmd}">
          <div class="text-danger small" th:if="${#fields.hasErrors('priceAmd')}" th:errors="*{priceAmd}">err</div>
        </div>

        <div class="col-md-4">
          <label class="form-label">Name (EN)</label>
          <input class="form-control bg-dark text-light border-secondary" th:field="*{nameEn}">
          <div class="text-danger small" th:if="${#fields.hasErrors('nameEn')}" th:errors="*{nameEn}">err</div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Name (RU)</label>
          <input class="form-control bg-dark text-light border-secondary" th:field="*{nameRu}">
          <div class="text-danger small" th:if="${#fields.hasErrors('nameRu')}" th:errors="*{nameRu}">err</div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Name (HY)</label>
          <input class="form-control bg-dark text-light border-secondary" th:field="*{nameHy}">
          <div class="text-danger small" th:if="${#fields.hasErrors('nameHy')}" th:errors="*{nameHy}">err</div>
        </div>

        <div class="col-12 d-flex gap-2 flex-wrap">
          <button class="btn btn-gold" type="submit">Save</button>
          <a class="btn btn-outline-light" th:href="@{/admin/services}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</main>
</body>
</html>
