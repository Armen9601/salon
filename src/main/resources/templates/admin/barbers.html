<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(~{::main})}">
<main>
  <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mb-4">
    <div>
      <h1 class="h3 fw-bold mb-1">Barbers</h1>
      <div class="text-secondary">Add, edit, or delete barbers.</div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-light btn-sm" th:href="@{/admin}">← Dashboard</a>
      <a class="btn btn-gold btn-sm" th:href="@{/admin/barbers/new}">+ Add barber</a>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-6 col-lg-4" th:each="b : ${barbers}">
      <div class="card card-glass h-100">
        <div class="card-body">
          <div class="fw-semibold fs-5" th:text="${b.fullName}">Name</div>
          <div class="text-secondary small mt-1" th:text="${b.bio}">Bio</div>
        </div>
        <div class="card-footer bg-transparent border-secondary d-flex gap-2">
          <a class="btn btn-outline-light btn-sm flex-grow-1" th:href="@{/admin/barbers/{id}/edit(id=${b.id})}">Edit</a>
          <form th:action="@{/admin/barbers/delete}" method="post" class="m-0">
            <input type="hidden" name="id" th:value="${b.id}">
            <button class="btn btn-outline-danger btn-sm" type="submit">Delete</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
