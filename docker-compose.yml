services:
  postgres:
    image: postgres:16
    container_name: gevorgyans-salon-postgres
    environment:
      POSTGRES_DB: salon
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon
    ports:
      - "5432:5432"
    volumes:
      - salon_pgdata:/var/lib/postgresql/data

volumes:
  salon_pgdata:

